# Trino catalog "iceberg" — this file's NAME is the catalog name in SQL:
#
#   SELECT * FROM iceberg.coffee.lots LIMIT 10;
#                 └─────┘ └────┘ └──┘
#                 catalog  schema table
#
# Tables are stored in MinIO and tracked by Nessie via the standard
# Iceberg REST catalog protocol (NOT the legacy native Nessie connector).
#
# Property names verified against Trino 481 docs:
#   https://trino.io/docs/current/object-storage/metastores.html#iceberg-rest-catalog
#   https://trino.io/docs/current/object-storage/file-system-s3.html
connector.name=iceberg

# ── Catalog: Nessie speaks Iceberg REST ─────────────────────────────────────
iceberg.catalog.type=rest
# The trailing "main" pins the Nessie branch this catalog reads and writes.
# (Point a second catalog file at another branch to query it side by side!)
iceberg.rest-catalog.uri=http://nessie:19120/iceberg/main

# ── Storage: MinIO through Trino's native S3 filesystem ─────────────────────
fs.s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
# MinIO serves buckets as http://host/bucket (path-style), not bucket.host.
s3.path-style-access=true
# Obvious local-dev credentials on purpose. If you change them in .env,
# change them here too. Never put real secrets in a properties file.
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
